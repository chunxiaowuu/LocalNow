name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend · lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      UV_PYTHON: "3.12"        # 选 Python 但不激活根级 venv，确保用 backend/.venv
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install deps
        # 本项目 dev 工具放在 [project.optional-dependencies]，需 --extra dev
        # （--dev 对应的是 PEP 735 dependency-groups，本项目未用）
        run: uv sync --frozen --extra dev
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: Frontend · typecheck, lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: localnow-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: localnow-frontend:ci
          build-args: NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max
